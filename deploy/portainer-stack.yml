# Stack para o Portainer (Docker Swarm) — backend + Postgres + Redis atrás do Traefik.
#
# A imagem do backend é buildada pelo GitHub Actions e publicada no GHCR a cada
# push na main (.github/workflows/docker-image.yml):
#   ghcr.io/reynario/sistema-pre-atendimento:latest
#
# No Portainer: Stacks → Add stack → cole este arquivo (ou aponte pro repositório
# com compose path "deploy/portainer-stack.yml") e preencha as variáveis:
#   POSTGRES_PASSWORD, JWT_SECRET, API_DOMAIN, FRONTEND_ORIGIN, OPENAI_API_KEY
#   (+ UAZAPI_BASE_URL quando for conectar o WhatsApp)
#
# DNS: api.SEU-DOMINIO → IP do servidor. O Traefik emite o certificado.

version: "3.9"

services:
  backend:
    image: ghcr.io/reynario/sistema-pre-atendimento:latest

    environment:
      DATABASE_URL: "postgresql://alo:${POSTGRES_PASSWORD}@postgres:5432/alo"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      PORT: "3333"
      PUBLIC_URL: "https://${API_DOMAIN}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      UAZAPI_BASE_URL: "${UAZAPI_BASE_URL:-}"
      UAZAPI_ADMIN_TOKEN: "${UAZAPI_ADMIN_TOKEN:-}"
      # Web push (opcional): gere com `npx web-push generate-vapid-keys`
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:rndigitalmidia@gmail.com}"
      TZ: "America/Sao_Paulo"

    networks:
      - RNNet
      - alo_internal

    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=RNNet"
        - "traefik.http.routers.alo-api.rule=Host(`${API_DOMAIN}`)"
        - "traefik.http.routers.alo-api.entrypoints=websecure"
        - "traefik.http.routers.alo-api.tls=true"
        - "traefik.http.routers.alo-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.alo-api.loadbalancer.server.port=3333"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "alo"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "alo"
      TZ: "America/Sao_Paulo"
    volumes:
      - "alo_pgdata:/var/lib/postgresql/data"
    networks:
      - alo_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    # Sem portas publicadas: o banco só é acessível pela rede interna do stack

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - "alo_redisdata:/data"
    networks:
      - alo_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # Backup diário do Postgres (dumps no volume alo_backups; sincronize esse
  # volume para fora do servidor — ex: rclone para R2/S3)
  backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: "${POSTGRES_PASSWORD}"
      TZ: "America/Sao_Paulo"
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          pg_dump -h postgres -U alo alo | gzip > /backups/alo-$$(date +%Y%m%d-%H%M).sql.gz
          # mantém os últimos 14 dumps
          ls -1t /backups/*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm
          sleep 86400
        done
    volumes:
      - "alo_backups:/backups"
    networks:
      - alo_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

networks:
  RNNet:
    external: true
  alo_internal:
    driver: overlay

volumes:
  alo_pgdata:
  alo_redisdata:
  alo_backups:
