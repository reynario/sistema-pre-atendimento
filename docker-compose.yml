version: "3.8"

# Infra local de DESENVOLVIMENTO (Postgres + Redis).
# Para produção na Hetzner (Portainer + Traefik), use deploy/portainer-stack.yml.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: alo
      POSTGRES_PASSWORD: alo_dev_password
      POSTGRES_DB: alo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
